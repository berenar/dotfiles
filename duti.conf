# duti.conf — default app associations for macOS
# Format: <bundle-id>  <extension-or-UTI>  <role>
# Apply with: duti ~/dotfiles/duti.conf
# Inspect current default for an extension: duti -x <ext>
# Find a bundle id: osascript -e 'id of app "App Name"'

# Markdown / text
doc.md-preview              .md         all
doc.md-preview              .markdown   all
com.apple.TextEdit          .txt        all
com.apple.TextEdit          .text       all

