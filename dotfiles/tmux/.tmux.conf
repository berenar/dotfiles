# Leader key
set -g prefix C-a

# Keybind to reload tmux config
unbind r
bind r source-file ~/.tmux.conf \; display "`tmux.conf` reloaded!"

# Split panes using | and -
unbind '"'
unbind %
# When managing panes, start in the current path
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Move between panes
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

bind-key b last-window
bind-key -n M-S-Left swap-window -t -1 \; select-window -t -1
bind-key -n M-S-Right swap-window -t +1 \; select-window -t +1

# Rebind 'w' to use a custom format
bind w choose-tree -Z -F "#{?pane_format,#{pane_current_command} #[fg=colour244]#{pane_current_path},#{?window_format,#{window_name}#{window_flags},#{session_name}}}"

bind s display-popup -E -w 90% -h 80% "$HOME/.local/bin/tmux-session-switcher"
# Click the session name on the left of the status bar to open the session switcher
bind -n MouseDown1StatusLeft display-popup -E -w 90% -h 80% "$HOME/.local/bin/tmux-session-switcher"

# Jump to the session/window of the latest claude alert (the pill on status-right is also clickable)
bind Enter run-shell "$HOME/.local/bin/tmux-alert-indicator --goto '#{client_session}' '#{client_name}'"
bind -n MouseDown1StatusRight run-shell "$HOME/.local/bin/tmux-alert-indicator --goto '#{client_session}' '#{client_name}'"

bind-key f display-popup -E "$HOME/.local/bin/tmux-sessionizer"

# Remove time keybind
unbind 't'

set -g default-terminal "tmux-256color"
set -ag terminal-features ",xterm-256color:RGB"

# Make windows start on the index 1 instead of 0
set -g base-index 1
setw -g pane-base-index 1
set-option -g renumber-windows on

# Enable mouse support
set -g mouse on
set -g history-limit 20000

# Enable copy mode with keyboard too
setw -g mode-keys vi

set -g focus-events on

# Status bar
set-option -g status-position bottom
set -g status-style "bg=default"
set -g status-left-length 50
set -g status-interval 5

# https://code.claude.com/docs/en/terminal-config#terminal-notifications
set -g allow-passthrough on

set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# Plugins


# prefix s/r to manually save/restore sessions
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-processes 'lazygit'

# a nice looking status bar
set -g @plugin 'vaaleyard/tmux-dotbar'
set -g @tmux-dotbar-bg "default"
set -g @tmux-dotbar-window-status-format " #I #W "
# show the most recently alerted session (claude finished in another session)
set -g @tmux-dotbar-right "true"
set -g @tmux-dotbar-status-right "#($HOME/.local/bin/tmux-alert-indicator '#{client_session}')"

# utilities for managing tmux sessions
set -g @plugin 'tmux-plugins/tmux-sessionist'

# automatic saving/restoring of sessions.
# Must load AFTER any plugin that sets `status-right` (e.g. tmux-dotbar):
# continuum enables auto-save by appending `#(continuum_save.sh)` to
# status-right, and a plugin setting status-right afterwards wipes that hook,
# silently stopping auto-save.
set -g @plugin 'tmux-plugins/tmux-continuum'

# automatically start tmux on system boot
set -g @continuum-boot 'on'
set -g @continuum-boot-options 'kitty'
set -g @continuum-save-interval '5'
set -g @continuum-restore 'on'

if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# Alert highlight for window tabs, must be set after tmux-dotbar runs to override it.
# Lowercase hex on purpose: uppercase #D is a tmux format alias (pane_id) and gets
# mangled when status-format expands this option.
set -g window-status-bell-style "fg=#d78787"

# Amber window name while Claude is actively thinking (@claude_running set by the
# set-claude-running hook), mirroring the red bell "waiting for input" state.
# Must run after tmux-dotbar sets window-status-format; idempotent across reloads.
run-shell "$HOME/.local/bin/tmux-claude-window-style"

# To install them, Press prefix + I
